    </style>
    <pattern id="scanlines3" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="800" height="1" fill="#00ff8c" fill-opacity="0.008"/>
    </pattern>
    <radialGradient id="glow3" cx="50%" cy="50%" r="65%" gradientUnits="userSpaceOnUse" fx="400" fy="90">
      <stop offset="0%" stop-color="#00ff8c" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00ff8c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="180" fill="#080d14"/>
  <rect width="800" height="180" fill="url(#glow3)"/>
