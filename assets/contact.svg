  <text x="130" y="76" font-size="12" fill="#4a6070" font-family="'Space Mono','Courier New',monospace">github.com/emmi-dev12</text>
  <line x1="40" y1="82" x2="380" y2="82" stroke="#00ff8c" stroke-opacity="0.06" stroke-width="0.5"/>

