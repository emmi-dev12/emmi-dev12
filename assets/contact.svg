  <text x="130" y="106" font-size="12" fill="#4a6070" font-family="'Space Mono','Courier New',monospace">keys.openpgp.org · 0xF3A92C8D</text>
  <line x1="40" y1="112" x2="440" y2="112" stroke="#00ff8c" stroke-opacity="0.06" stroke-width="0.5"/>

