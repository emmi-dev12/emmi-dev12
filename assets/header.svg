<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Syne:wght@700;800&amp;display=swap');
      text { font-family: 'Space Mono', 'Courier New', monospace; }
      .heading { font-family: 'Syne', 'Arial', sans-serif; font-weight: 800; }
    </style>
    <pattern id="scanlines" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="800" height="1" fill="#00ff8c" fill-opacity="0.008"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="65%" gradientUnits="userSpaceOnUse" fx="400" fy="160">
      <stop offset="0%" stop-color="#00ff8c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00ff8c" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame-clip">
      <polygon points="0,0 793,0 800,7 800,320 7,320 0,313"/>
    </clipPath>
  </defs>

  <!-- Base bg -->
  <rect width="800" height="320" fill="#080d14"/>

  <!-- Radial glow -->
  <rect width="800" height="320" fill="url(#glow)"/>

  <!-- Scanlines -->
  <rect width="800" height="320" fill="url(#scanlines)"/>

  <!-- Outer border polygon -->
  <polygon points="0,0 793,0 800,7 800,319.5 7,319.5 0,313" fill="none" stroke="#00ff8c" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Inner subtle grid lines -->
  <line x1="0" y1="60" x2="800" y2="60" stroke="#00ff8c" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="260" x2="800" y2="260" stroke="#00ff8c" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="60" y1="0" x2="60" y2="320" stroke="#00ff8c" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="740" y1="0" x2="740" y2="320" stroke="#00ff8c" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Top-left corner accent -->
  <polyline points="40,20 20,20 20,40" fill="none" stroke="#00ff8c" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Top-right corner accent -->
  <polyline points="760,20 780,20 780,40" fill="none" stroke="#00ff8c" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Bottom-left corner accent -->
  <polyline points="20,280 20,300 40,300" fill="none" stroke="#00ff8c" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Bottom-right corner accent -->
  <polyline points="780,280 780,300 760,300" fill="none" stroke="#00ff8c" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- Section label: IDENTITY -->
  <text x="40" y="50" font-size="10" letter-spacing="4" fill="#2d4050" font-family="'Space Mono','Courier New',monospace" font-weight="700">IDENTITY</text>
  <line x1="108" y1="44" x2="760" y2="44" stroke="#2d4050" stroke-opacity="0.4" stroke-width="0.5"/>

  <!-- Diamond logo symbol -->
  <text x="40" y="118" font-size="22" fill="#00ff8c" font-family="'Space Mono','Courier New',monospace">◈</text>

  <!-- Main name heading -->
  <text x="72" y="112" font-size="36" letter-spacing="3" fill="#c8d4e0" font-family="'Syne','Arial',sans-serif" font-weight="800">EMMI-DEV12</text>

  <!-- Handle -->
  <text x="74" y="136" font-size="12" fill="#00ff8c" font-family="'Space Mono','Courier New',monospace" letter-spacing="1">@emmi-dev12</text>

  <!-- Divider -->
  <line x1="40" y1="152" x2="400" y2="152" stroke="#00ff8c" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Bio lines -->
  <text x="40" y="172" font-size="12.5" fill="#4a6070" font-family="'Space Mono','Courier New',monospace">Indie solo dev. AI-assisted architect. Prompt engineer.</text>
  <text x="40" y="192" font-size="12.5" fill="#4a6070" font-family="'Space Mono','Courier New',monospace">Privacy-first tools, free and open source forever.</text>
  <text x="40" y="212" font-size="12.5" fill="#4a6070" font-family="'Space Mono','Courier New',monospace">No subscriptions. No lock-in. Anti-SaaS.</text>

  <!-- Tags -->
  <rect x="40" y="230" width="100" height="20" rx="1" fill="#00ff8c" fill-opacity="0.06" stroke="#00ff8c" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="50" y="244" font-size="10" fill="#00ff8c" font-family="'Space Mono','Courier New',monospace">TYPESCRIPT</text>

  <rect x="150" y="230" width="62" height="20" rx="1" fill="#00ff8c" fill-opacity="0.06" stroke="#00ff8c" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="160" y="244" font-size="10" fill="#00ff8c" font-family="'Space Mono','Courier New',monospace">PYTHON</text>

  <rect x="222" y="230" width="56" height="20" rx="1" fill="#00ff8c" fill-opacity="0.06" stroke="#00ff8c" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="232" y="244" font-size="10" fill="#00ff8c" font-family="'Space Mono','Courier New',monospace">SWIFT</text>

  <rect x="288" y="230" width="136" height="20" rx="1" fill="#00ff8c" fill-opacity="0.06" stroke="#00ff8c" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="298" y="244" font-size="10" fill="#00ff8c" font-family="'Space Mono','Courier New',monospace">AI-ASSISTED DEV</text>

  <rect x="434" y="230" width="136" height="20" rx="1" fill="#00ff8c" fill-opacity="0.06" stroke="#00ff8c" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="444" y="244" font-size="10" fill="#00ff8c" font-family="'Space Mono','Courier New',monospace">PROMPT ENGINEER</text>

  <!-- Status indicator -->
  <circle cx="731" cy="88" r="4" fill="#00ff8c" fill-opacity="0.8"/>
  <text x="742" y="92" font-size="10" fill="#4a6070" font-family="'Space Mono','Courier New',monospace">ONLINE</text>

  <!-- Encrypted ID block -->
  <text x="630" y="180" font-size="9" fill="#2d4050" font-family="'Space Mono','Courier New',monospace">sig: 3f7a9c2d</text>
  <text x="630" y="196" font-size="9" fill="#2d4050" font-family="'Space Mono','Courier New',monospace">pub: ed25519</text>
  <text x="630" y="212" font-size="9" fill="#2d4050" font-family="'Space Mono','Courier New',monospace">enc: x25519</text>
  <text x="630" y="228" font-size="9" fill="#2d4050" font-family="'Space Mono','Courier New',monospace">hash: sha3-256</text>

  <!-- Bottom section label -->
  <text x="40" y="295" font-size="9" letter-spacing="3" fill="#2d4050" font-family="'Space Mono','Courier New',monospace">◈ AUTHENTICATED SESSION</text>
  <text x="600" y="295" font-size="9" fill="#2d4050" font-family="'Space Mono','Courier New',monospace">NODE_0x4f2a · LAT 0ms</text>
</svg>
